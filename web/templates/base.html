<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}{{.Title}}{{end}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico">
</head>
<body>
<nav class="navbar is-link" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a class="navbar-item has-text-weight-bold" href="/">{{.Title}}</a>
    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarMenu">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>
  <div id="navbarMenu" class="navbar-menu">
    <div class="navbar-end">
      <a class="navbar-item" href="/links">All Links</a>
      {{if .Identity}}
      <a class="navbar-item" href="/mylinks">My Links</a>
      <a class="navbar-item" href="/new">New Link</a>
      {{if eq .Identity.Source "oidc"}}
      <a class="navbar-item" href="/auth/logout">Logout ({{.Identity.Email}})</a>
      {{else if and (eq .Identity.Source "anonymous") .OIDCEnabled}}
      <span class="navbar-item">{{.Identity.Email}}</span>
      <a class="navbar-item" href="/auth/login">Login</a>
      {{else}}
      <span class="navbar-item">{{.Identity.Email}}</span>
      {{end}}
      {{else}}
      <a class="navbar-item" href="/auth/login">Login</a>
      {{end}}
    </div>
  </div>
</nav>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var burgers = document.querySelectorAll('.navbar-burger');
    burgers.forEach(function (burger) {
      burger.addEventListener('click', function () {
        var target = document.getElementById(burger.dataset.target);
        burger.classList.toggle('is-active');
        burger.setAttribute('aria-expanded', burger.classList.contains('is-active'));
        if (target) { target.classList.toggle('is-active'); }
      });
    });
  });
</script>
<section class="section">
  <div class="container">
    {{block "content" .}}{{end}}
  </div>
</section>
</body>
</html>
