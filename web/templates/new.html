{{template "base.html" .}}
{{define "title"}}New Link — {{.Title}}{{end}}
{{define "content"}}
<h1 class="title">Create New Link</h1>
{{if .Error}}<div class="notification is-danger">{{.Error}}</div>{{end}}
<div class="box" style="max-width: 600px">
<form method="POST" action="/new">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <div class="field">
    <label class="label">Link Name</label>
    <div class="field has-addons">
      <div class="control is-expanded">
        <input class="input" type="text" name="name" value="{{.Form.Name}}" placeholder="my-link" required>
      </div>
      <div class="control">
        <button type="button" class="button is-info"
          hx-get="/api/quickname" hx-target="[name=name]" hx-swap="outerHTML">
          Random
        </button>
      </div>
    </div>
    <p class="help">Letters, digits, hyphens, underscores, and dots only.</p>
  </div>
  <div class="field">
    <label class="label">Target URL</label>
    <div class="control">
      <input class="input" type="url" name="target" value="{{.Form.Target}}" placeholder="https://example.com" required>
    </div>
  </div>
  <div class="field">
    <label class="checkbox">
      <input type="checkbox" name="is_advanced" {{if .Form.IsAdvanced}}checked{{end}}> Advanced (Go template)
    </label>
  </div>
  <div class="field">
    <label class="checkbox">
      <input type="checkbox" name="require_auth" {{if .Form.RequireAuth}}checked{{end}}> Require authentication
    </label>
  </div>
  <div class="field">
    <div class="control">
      <button class="button is-primary" type="submit">Create</button>
      <a class="button" href="/">Cancel</a>
    </div>
  </div>
</form>
</div>
{{end}}
