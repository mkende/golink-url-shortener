{{template "base.html" .}}
{{define "title"}}New Link — {{.Title}}{{end}}
{{define "content"}}
<h1 class="title">Create New Link</h1>
{{if .Error}}<div class="notification is-danger">{{.Error}}</div>{{end}}
<div class="box" style="max-width: 600px">
<form method="POST" action="/new">
  <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
  <div class="field">
    <label class="label">Link Type</label>
    <div class="control">
      <label class="radio">
        <input type="radio" name="link_type" value="simple" {{if ne .Form.LinkType "advanced"}}{{if ne .Form.LinkType "alias"}}checked{{end}}{{end}}> Simple
      </label>
      {{if .AllowAdvancedLinks}}
      <label class="radio">
        <input type="radio" name="link_type" value="advanced" {{if eq .Form.LinkType "advanced"}}checked{{end}}> Advanced (Go Template)
      </label>
      <a href="/help/advanced" target="_blank" title="Advanced syntax help"
         style="display: inline-flex; align-items: center; justify-content: center;
                width: 1.2em; height: 1.2em; border: 1.5px solid #666; border-radius: 50%;
                font-size: 0.85em; font-weight: bold; color: #666; text-decoration: none;
                vertical-align: middle; margin-left: 0.3em;">?</a>
      {{end}}
      <label class="radio" style="margin-left: 1em;">
        <input type="radio" name="link_type" value="alias" {{if eq .Form.LinkType "alias"}}checked{{end}}> Alias
      </label>
    </div>
  </div>
  <div class="field">
    <label class="label" for="target" id="target-label">Target URL</label>
    <div class="control">
      <input id="target" class="input" type="text" name="target" value="{{.Form.Target}}" placeholder="https://example.com" required>
    </div>
  </div>
  <div class="field">
    <label class="label" for="name">Link Name</label>
    <div class="field has-addons">
      <div class="control is-expanded">
        <input id="name" class="input" type="text" name="name" value="{{.Form.Name}}" placeholder="my-link" required aria-describedby="name-help">
      </div>
      <div class="control">
        <button type="button" class="button is-info" data-random-for="name"
          hx-get="/api/quickname" hx-target="[name=name]" hx-swap="outerHTML">
          Random
        </button>
      </div>
    </div>
    <p id="name-help" class="help">Letters, digits, hyphens, underscores, and dots only.</p>
  </div>
  <div class="field">
    <label class="checkbox">
      <input type="checkbox" name="require_auth" {{if .Form.RequireAuth}}checked{{end}}> Require authentication
    </label>
  </div>
  <div class="field">
    <div class="control">
      <button class="button is-primary" type="submit">Create</button>
      <a class="button" href="/">Cancel</a>
    </div>
  </div>
</form>
</div>
{{end}}
