{{define "pagination"}}
<div style="display:flex; justify-content:space-between; align-items:center; min-height:2.5em;">
  <div>
    {{if and (gt .TotalPages 1) (gt .Page 1)}}
    <a class="button" href="?page={{sub .Page 1}}&q={{.Query}}&sort={{.Sort}}&dir={{.Dir}}">← Previous</a>
    {{else}}<span class="button is-invisible" aria-hidden="true">← Previous</span>{{end}}
  </div>
  <div>
    {{if and (gt .TotalPages 1) (lt .Page .TotalPages)}}
    <a class="button" href="?page={{add .Page 1}}&q={{.Query}}&sort={{.Sort}}&dir={{.Dir}}">Next →</a>
    {{else}}<span class="button is-invisible" aria-hidden="true">Next →</span>{{end}}
  </div>
</div>
{{end}}
