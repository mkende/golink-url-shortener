{{define "pagination"}}
{{if gt .TotalPages 1}}
<div style="display:flex; justify-content:space-between; align-items:center;">
  <div>
    {{if gt .Page 1}}
    <a class="button" href="?page={{sub .Page 1}}&q={{.Query}}&sort={{.Sort}}&dir={{.Dir}}">← Previous</a>
    {{end}}
  </div>
  <div>
    {{if lt .Page .TotalPages}}
    <a class="button" href="?page={{add .Page 1}}&q={{.Query}}&sort={{.Sort}}&dir={{.Dir}}">Next →</a>
    {{end}}
  </div>
</div>
{{end}}
{{end}}
