{{template "base.html" .}}
{{define "content"}}
<h1 class="title">{{.Title}}</h1>
<div class="columns">
  <div class="column is-half">
    <div class="box">
      <h2 class="subtitle">Quick Create</h2>
      <form method="POST" action="/new">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div class="field has-addons">
          <div class="control is-expanded">
            <input class="input" type="text" name="name" placeholder="link-name" value="">
          </div>
          <div class="control">
            <button type="button" class="button is-info"
              hx-get="/api/quickname" hx-target="[name=name]" hx-swap="outerHTML">
              Random
            </button>
          </div>
        </div>
        <div class="field">
          <div class="control">
            <input class="input" type="url" name="target" placeholder="https://example.com" required>
          </div>
        </div>
        <div class="field">
          <div class="control">
            <button class="button is-primary" type="submit">Create</button>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="column">
    {{if .RecentLinks}}
    <div class="box">
      <h2 class="subtitle">My Recent Links</h2>
      {{template "link_table" .RecentLinks}}
    </div>
    {{end}}
  </div>
</div>
{{if .PopularLinks}}
<div class="box">
  <h2 class="subtitle">Popular Links</h2>
  {{template "link_table" .PopularLinks}}
</div>
{{end}}
{{end}}
