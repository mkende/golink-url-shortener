# golink-redirector configuration template
#
# Copy this file to simple.conf (or any path you prefer) and adjust the values
# below. Lines beginning with '#' are comments. All keys are optional unless
# marked REQUIRED.
#
# Pass the path to your config file via the -config flag when starting the
# server, e.g.:
#   golink -config /etc/golink/simple.conf

# ─── Server ──────────────────────────────────────────────────────────────────

# TCP address the HTTP server will bind to.
# Default: "0.0.0.0:8080"
listen_addr = "0.0.0.0:8080"

# REQUIRED. Public hostname for this instance (without scheme), e.g.
# "go.example.com". Used to build redirect URLs, enforce HTTPS redirects, and
# construct OIDC callback URLs.
canonical_domain = "go.example.com"

# Human-readable product name shown in the browser title and navigation.
# Default: "GoLink"
title = "GoLink"

# Filesystem path to a custom favicon file (ICO, PNG, or SVG).
# Leave empty to use the built-in default favicon.
# Default: "" (use embedded favicon)
favicon_path = ""

# ─── Authentication ───────────────────────────────────────────────────────────

# When true, unauthenticated users cannot follow any redirect; they are
# redirected to the login page instead.
# Default: false
require_auth_for_redirects = false

# ── Anonymous (user-less) auth ────────────────────────────────────────────────
# In anonymous mode every request is automatically treated as a single shared
# user ("anonymous@localhost"). No login flow is required.
#
# Use this for local development, testing, or isolated private instances where
# real user management is unnecessary.
#
# WARNING: Do not enable this on a publicly reachable server. Any visitor will
# be able to create, edit, and delete links as the anonymous user.
[anonymous]
# Default: false
enabled = false

# Grant the anonymous user full admin privileges (API key management,
# import/export). Useful when you also need admin features in a private
# instance.
# Default: false
is_admin = false

# ── Tailscale header-based auth ───────────────────────────────────────────────
# When your server sits behind a Tailscale node that injects Tailscale-User-*
# headers, enable this to use those headers for authentication. No additional
# credentials are needed.
[tailscale]
# Default: false
enabled = false

# ── OpenID Connect auth ───────────────────────────────────────────────────────
[oidc]
# Default: false
enabled = false

# OIDC provider issuer URL (must match the "iss" claim in tokens).
# Example: "https://accounts.google.com"
issuer = ""

# OAuth2 client identifier issued by the provider.
client_id = ""

# OAuth2 client secret issued by the provider. Keep this confidential.
client_secret = ""

# OAuth2 scopes to request from the provider.
# Add "groups" to receive group membership claims (required for admin_group and
# group-based sharing). Authelia and Keycloak both support this scope.
# Default: ["openid", "email", "profile"]
scopes = ["openid", "email", "profile"]

# Name of the JWT/userinfo claim that contains the user's group memberships.
# Used for group-based sharing and the admin_group setting below.
# Default: "groups" (correct for Authelia, Keycloak, Dex, and most providers)
groups_claim = "groups"

# ── Authelia provider notes ───────────────────────────────────────────────────
# When using Authelia as your OIDC provider, register a client with these
# settings in your Authelia configuration (authelia/configuration.yml):
#
#   identity_providers:
#     oidc:
#       clients:
#         - client_id: "golink"
#           client_secret: "<bcrypt-hashed-secret>"
#           authorization_policy: one_factor   # or two_factor
#           redirect_uris:
#             - "https://go.example.com/auth/callback"
#           scopes: ["openid", "email", "profile", "groups"]
#           token_endpoint_auth_method: client_secret_basic
#           userinfo_signed_response_alg: none
#
# In this file, set:
#   issuer = "https://authelia.example.com"   # Authelia root URL
#   scopes = ["openid", "email", "profile", "groups"]
#
# The redirect URL (https://<canonical_domain>/auth/callback) is constructed
# automatically from canonical_domain — no redirect_url setting is needed.

# REQUIRED when oidc.enabled = true.
# HMAC secret used to sign session JWT cookies. Use a long random string
# (at least 32 bytes). Generate one with: openssl rand -base64 32
jwt_secret = ""

# ─── Database ─────────────────────────────────────────────────────────────────
[db]
# Database backend to use.
# Valid values: "sqlite", "postgres"
# Default: "sqlite"
driver = "sqlite"

# Data source name (DSN) / connection string.
# For SQLite: a file path (relative or absolute). The file is created if it
# does not exist.
# For PostgreSQL: a standard libpq connection string, e.g.
#   "host=localhost port=5432 dbname=golink user=golink password=secret sslmode=require"
# Default: "golink.db"
dsn = "golink.db"

# ─── Links ────────────────────────────────────────────────────────────────────

# Number of characters in a randomly-generated quick-link name.
# Must be >= 4.
# Default: 6
quick_link_length = 6

# Domain appended to bare email addresses (without an @) when resolving link
# share targets. For example, if default_domain is "example.com" then sharing
# with "alice" is treated as "alice@example.com".
# Default: "" (disabled)
default_domain = ""

# If set, link sharing is restricted to addresses in this domain only.
# An attempt to share with an address outside this domain is rejected.
# Default: "" (no restriction)
required_domain = ""

# ─── Performance ─────────────────────────────────────────────────────────────

# Maximum number of links kept in the in-process LRU redirect cache. Hot links
# are served from memory without a database round-trip. Increase for workloads
# with many distinct popular links.
# Default: 1000
cache_size = 1000

# Maximum number of alias links that may target any single canonical link.
# Attempts to create aliases beyond this limit are rejected.
# Default: 100
max_aliases_per_link = 100

# ─── Admin ────────────────────────────────────────────────────────────────────

# Email addresses of users who have full admin privileges.
# Admins can manage API keys and run import/export operations.
# Example: ["alice@example.com", "bob@example.com"]
# Default: [] (no admins)
admin_emails = []

# OIDC group name whose members are treated as admins. Requires OIDC to be
# enabled and the groups_claim to be correctly configured.
# Default: "" (disabled)
admin_group = ""
