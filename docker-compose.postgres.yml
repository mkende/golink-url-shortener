version: "3.9"

# Variant: golink with external PostgreSQL database.
# Edit ./config/simple.conf to set db.driver = "postgres" and db.dsn accordingly.
services:
  golink:
    image: ghcr.io/mkende/golink-redirector:latest
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: golink
      POSTGRES_USER: golink
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golink"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
