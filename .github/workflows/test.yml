name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    # On PRs, only run automatically for repo owners, members, and collaborators.
    # External contributors' PRs require a maintainer to add the 'safe-to-test'
    # label (handled by test-external.yml). This prevents CI abuse from forks.
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache embedded-postgres binary
        uses: actions/cache@v4
        with:
          path: ~/.embedded-postgres-go
          key: embedded-postgres-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Install CGO dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Run tests
        run: go test ./...
