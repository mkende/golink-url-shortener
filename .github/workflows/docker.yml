name: Docker

on:
  workflow_run:
    workflows: [Tag release]
    types: [completed]

jobs:
  build:
    name: Build and push Docker image
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Find version tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "major=$(echo "${TAG}" | grep -oE '^v[0-9]+')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.tag.outputs.name != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tag.outputs.name != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.tag.outputs.name != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mkende/golink
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.tag.outputs.name }}
            type=raw,value=${{ steps.tag.outputs.major }},enable=${{ !contains(steps.tag.outputs.name, '-') }}
            type=raw,value=latest,enable=${{ !contains(steps.tag.outputs.name, '-') && steps.tag.outputs.name != '' }}

      - name: Build and push
        if: steps.tag.outputs.name != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.tag.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
